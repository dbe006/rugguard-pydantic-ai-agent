name: Publish to PyPI

# Triggered by a published GitHub Release. Uses PyPI Trusted Publishing
# (OIDC) so no long-lived PyPI token is stored in repo secrets.
#
# Setup on PyPI side:
#   1. https://pypi.org/manage/account/publishing/
#   2. Add a Trusted Publisher with:
#        Owner       : dbe006
#        Repository  : rugguard-pydantic-ai-agent
#        Workflow    : publish.yml
#        Environment : pypi
#   3. Create the `pypi` environment in this repo's Settings → Environments.

on:
  release:
    types: [published]

permissions:
  contents: read
  # Required for PyPI Trusted Publishing — issues an OIDC token bound to
  # this exact workflow run.
  id-token: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/rugguard-pydantic-ai-agent
    steps:
      # actions/checkout@v4 → 34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      # actions/setup-python@v5 → a26af69be951a213d495a4c3e4e4022e16d87065
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build sdist + wheel
        run: python -m build

      - name: Verify build artifacts
        run: |
          ls -la dist/
          test -f dist/rugguard_pydantic_ai_agent-*.whl
          test -f dist/rugguard_pydantic_ai_agent-*.tar.gz

      # pypa/gh-action-pypi-publish@release/v1 → cef221092ed1bacb1cc03d23a2d87d1d172e277b
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b
